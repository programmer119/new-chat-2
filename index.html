<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Static Gagagle search page">
    <title>Gagagle</title>
    <link rel="stylesheet" href="styles.css?v=login-fix">
  </head>
  <body>
    <div class="page">
      <header class="topbar" aria-label="상단 링크">
        <nav class="topbar__left" aria-label="Gagagle 서비스">
          <a href="#about">Gagagle 정보</a>
          <a href="#index">검색 인덱스</a>
        </nav>
        <nav class="topbar__right" aria-label="사용자 메뉴">
          <a href="#mail">Gagagle Mail</a>
          <a href="#images">이미지</a>
          <button class="icon-button" type="button" aria-label="Gagagle 앱" title="Gagagle 앱">
            <span class="apps-grid" aria-hidden="true"></span>
          </button>
          <button id="openLoginButton" class="sign-in" type="button">로그인</button>
        </nav>
      </header>

      <main id="appMain" class="search-area">
        <h1 class="logo" aria-label="Gagagle">
          <span class="logo__blue">G</span><span class="logo__red">a</span><span class="logo__yellow">g</span><span class="logo__blue">a</span><span class="logo__green">g</span><span class="logo__red">l</span><span class="logo__blue">e</span>
        </h1>

        <form id="searchForm" class="search-form" action="./" method="get" role="search" autocomplete="off">
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9.5 4a5.5 5.5 0 0 1 4.38 8.83l4.15 4.14a.75.75 0 0 1-1.06 1.06l-4.14-4.15A5.5 5.5 0 1 1 9.5 4Zm0 1.5a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"></path>
            </svg>
            <input id="searchInput" name="q" type="search" aria-label="검색어 입력" autofocus>
            <button id="clearButton" class="clear-button" type="button" aria-label="검색어 지우기" title="지우기">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6.22 6.22a.75.75 0 0 1 1.06 0L12 10.94l4.72-4.72a.75.75 0 1 1 1.06 1.06L13.06 12l4.72 4.72a.75.75 0 1 1-1.06 1.06L12 13.06l-4.72 4.72a.75.75 0 0 1-1.06-1.06L10.94 12 6.22 7.28a.75.75 0 0 1 0-1.06Z"></path>
              </svg>
            </button>
            <span class="divider" aria-hidden="true"></span>
            <button class="voice-button" type="button" aria-label="음성 검색" title="음성 검색">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#4285f4" d="M12 14.5a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5.5a3 3 0 0 0 3 3Z"></path>
                <path fill="#34a853" d="M17.5 11.5a.75.75 0 0 0-1.5 0 4 4 0 0 1-8 0 .75.75 0 0 0-1.5 0 5.5 5.5 0 0 0 4.75 5.45v2.3H9a.75.75 0 0 0 0 1.5h6a.75.75 0 0 0 0-1.5h-2.25v-2.3a5.5 5.5 0 0 0 4.75-5.45Z"></path>
              </svg>
            </button>
            <button class="lens-button" type="button" aria-label="이미지로 검색" title="이미지로 검색">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#4285f4" d="M5.5 7.75A2.25 2.25 0 0 1 7.75 5.5h1.1l.82-1.23A1.75 1.75 0 0 1 11.13 3.5h1.74c.59 0 1.14.29 1.46.77l.82 1.23h1.1a2.25 2.25 0 0 1 2.25 2.25v2.1h-1.5v-2.1a.75.75 0 0 0-.75-.75h-1.5a.75.75 0 0 1-.62-.33l-1.05-1.58a.25.25 0 0 0-.21-.11h-1.74a.25.25 0 0 0-.21.11L9.87 6.67a.75.75 0 0 1-.62.33h-1.5a.75.75 0 0 0-.75.75v8.5c0 .41.34.75.75.75h4v1.5h-4a2.25 2.25 0 0 1-2.25-2.25v-8.5Z"></path>
                <path fill="#ea4335" d="M12 8.5a3.5 3.5 0 0 0-3.5 3.5h1.5a2 2 0 1 1 3.61 1.18l1.08 1.08A3.5 3.5 0 0 0 12 8.5Z"></path>
                <path fill="#fbbc04" d="M10 12H8.5a3.5 3.5 0 0 0 4.26 3.42l-1.28-1.28A2 2 0 0 1 10 12Z"></path>
                <path fill="#34a853" d="M16.25 14a2.25 2.25 0 1 0 0 4.5 2.25 2.25 0 0 0 0-4.5Zm-3.75 2.25a3.75 3.75 0 1 1 6.62 2.4l1.16 1.16a.75.75 0 1 1-1.06 1.06l-1.16-1.16a3.75 3.75 0 0 1-5.56-3.46Z"></path>
              </svg>
            </button>
          </div>

          <div class="actions">
            <button type="submit">Gagagle 검색</button>
            <button id="luckyButton" type="button">I'm Feeling Lucky</button>
          </div>
        </form>

        <section id="resultsPanel" class="results-panel" aria-live="polite" hidden>
          <div class="results-meta">
            <p id="resultsSummary"></p>
            <button id="backHomeButton" class="text-button" type="button">홈으로</button>
          </div>
          <div id="resultsList" class="results-list"></div>
        </section>

        <p class="language">Gagagle 제공 서비스: <a href="#english">English</a></p>
      </main>

      <section id="loginView" class="login-view" aria-labelledby="loginTitle" hidden>
        <div class="login-card">
          <div class="login-brand" aria-label="Gagagle">
            <span class="logo__blue">G</span><span class="logo__red">a</span><span class="logo__yellow">g</span><span class="logo__blue">a</span><span class="logo__green">g</span><span class="logo__red">l</span><span class="logo__blue">e</span>
          </div>
          <div class="login-copy">
            <h2 id="loginTitle">로그인</h2>
            <p>Gagagle 검색 계속하기</p>
          </div>

          <form id="loginForm" class="login-form" autocomplete="off">
            <label class="field">
              <span>아이디</span>
              <input id="loginId" name="loginId" type="text" autocomplete="username" required>
            </label>
            <label class="field">
              <span>비밀번호</span>
              <input id="loginPassword" name="loginPassword" type="password" autocomplete="current-password" required>
            </label>
            <p id="loginError" class="login-error" role="alert" hidden></p>
            <div class="login-actions">
              <button id="cancelLoginButton" class="text-button" type="button">취소</button>
              <button class="login-submit" type="submit">다음</button>
            </div>
          </form>
        </div>
      </section>

      <footer class="footer">
        <div class="footer__country">대한민국</div>
        <div class="footer__links">
          <nav aria-label="비즈니스 링크">
            <a href="#ads">광고</a>
            <a href="#business">비즈니스</a>
            <a href="#how-search-works">검색의 원리</a>
          </nav>
          <nav aria-label="정책 링크">
            <a href="#privacy">개인정보처리방침</a>
            <a href="#terms">약관</a>
            <a href="#settings">설정</a>
          </nav>
        </div>
      </footer>
    </div>

    <script src="script.js?v=login-fix"></script>
  </body>
</html>
